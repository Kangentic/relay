name: CI

# Pull-request gate only. Push-to-main is handled by release.yml, which
# calls the same checks.yml job set and then publishes - narrowing this
# workflow to pull_request is what stops the image from building twice on
# every merge.
on:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    uses: ./.github/workflows/checks.yml

  docker-build:
    name: Docker build (+ /healthz smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: relay:ci
      - name: Smoke-check /healthz
        run: |
          docker run -d --name relay-smoke -p 18080:8080 relay:ci
          for attempt in $(seq 1 10); do
            if curl -sf http://127.0.0.1:18080/healthz; then exit 0; fi
            sleep 1
          done
          docker logs relay-smoke
          exit 1
