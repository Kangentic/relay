name: Release

# Publishes ghcr.io/kangentic/relay on every merge to main (tagged `latest`
# and `sha-<full sha>`) and on a vX.Y.Z tag (tagged with semver plus a
# GitHub release), then deploys. Deploy is invoked here as a called job via
# `uses:`, never via a `release: published` trigger - GitHub suppresses
# workflow cascades raised by the default GITHUB_TOKEN, so a release
# created by the gh-release job below would never fire that trigger.
on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# contents: read, not {}: a caller job with NO permissions block of its own
# (checks and deploy below) inherits this workflow-level default, and
# GitHub needs at least contents: read to resolve a local reusable
# workflow reference (uses: ./.github/workflows/X.yml) at all - an empty
# default here causes that resolution to fail before any job runs
# (a zero-job startup_failure), not a runtime permission error inside a
# job. image and gh-release still declare their own broader overrides
# below.
permissions:
  contents: read

jobs:
  checks:
    name: Checks
    uses: ./.github/workflows/checks.yml

  image:
    name: Build & push image (GHCR)
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kangentic/relay
          # No bare {{major}} tag while pre-1.0: a `0` tag spanning every
          # 0.x release is a footgun. format=long because "the commit sha"
          # should mean the full 40 hex, not the 7-char default.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Determine this run's immutable deploy tag
        id: set-tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "image_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (load only, not pushed yet)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: relay:release-candidate
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-check /healthz
        run: |
          docker run -d --name relay-smoke -p 18080:8080 relay:release-candidate
          for attempt in $(seq 1 10); do
            if curl -sf http://127.0.0.1:18080/healthz; then exit 0; fi
            sleep 1
          done
          docker logs relay-smoke
          exit 1

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/kangentic/relay
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  gh-release:
    name: GitHub release
    needs: image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Assert package.json version matches the tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "tag v$tag_version does not match package.json version $pkg_version" >&2
            exit 1
          fi

      - name: Extract changelog section
        id: changelog
        run: |
          node scripts/release/extract-changelog.mjs "$GITHUB_REF_NAME" > release-notes.md

      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy
    needs: image
    uses: ./.github/workflows/deploy.yml
    with:
      image_tag: ${{ needs.image.outputs.image_tag }}
    secrets: inherit
