services:
  relay:
    image: ghcr.io/kangentic/relay:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    # SHUTDOWN_GRACE_MS defaults to 10000; give the process the full
    # budget to drain before Docker sends SIGKILL.
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:'+(process.env.PORT||8080)+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  # Uncomment this service if you are NOT putting Cloudflare's proxy in
  # front of this box and need TLS terminated locally instead. Caddy gets
  # automatic certificates for the hostname in Caddyfile.example, and see
  # that file for the TRUST_PROXY / TRUSTED_PROXY_CIDRS values it expects.
  #
  # caddy:
  #   image: caddy:2
  #   restart: unless-stopped
  #   ports:
  #     - "443:443"
  #     - "80:80"
  #   volumes:
  #     - ./Caddyfile.example:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data

# volumes:
#   caddy_data: {}
