# Production compose file for the hosted instance, invoked by
# scripts/deploy/deploy.sh, never by the self-hoster quickstart in
# docker-compose.yml. Standalone rather than an overlay: compose merges
# list keys like `ports` by appending, so an overlay trying to bind
# loopback-only would end up with a duplicate publish and fail.
#
# The relay's 8080 is bound to 127.0.0.1 only, never the public interface -
# Caddy reaches it over the internal `edge` bridge network by container
# name regardless of this host-side binding, which exists only so
# deploy.sh's health gate can probe the relay directly from the box
# without going through Caddy or Cloudflare.
#
# Two variables are resolved at compose-parse time, not container runtime:
#   RELAY_IMAGE_REF the full image reference for this deploy, exported by
#                   deploy.sh. A tag (ghcr.io/kangentic/relay:sha-<...>)
#                   for a forward deploy, or a digest
#                   (ghcr.io/kangentic/relay@sha256:...) for a rollback -
#                   never a bare tag var interpolated after a hardcoded
#                   colon, since that shape cannot express a digest.
#   RELAY_HOSTNAME  read from --env-file /opt/relay/.env (stable, not secret)
services:
  relay:
    image: ${RELAY_IMAGE_REF:?RELAY_IMAGE_REF must be set}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - /opt/relay/.env
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    # The connection cap alone cannot bound the MAX_BUFFERED_BYTES tail, so
    # this container memory limit is the actual OOM control on a 2 GB box.
    # Do not remove it under the assumption MAX_CONNECTIONS already covers
    # memory - it does not.
    mem_limit: 1200m
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:'+(process.env.PORT||8080)+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - edge

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - RELAY_HOSTNAME=${RELAY_HOSTNAME:?RELAY_HOSTNAME must be set}
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - ../cloudflare/trusted-proxies.caddy:/etc/caddy/trusted-proxies.caddy:ro
      - /opt/relay/secrets:/etc/caddy/origin:ro
      - caddy_data:/data
    networks:
      - edge
    depends_on:
      - relay

networks:
  edge:
    driver: bridge
    ipam:
      config:
        # Pinned deliberately: this exact subnet is what TRUSTED_PROXY_CIDRS
        # in /opt/relay/.env must match. Docker's default bridge subnet is
        # not guaranteed stable, and the relay only trusts CF-Connecting-IP
        # / X-Forwarded-For from a peer inside this range.
        - subnet: 172.31.240.0/24

volumes:
  caddy_data: {}
